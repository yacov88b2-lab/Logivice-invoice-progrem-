# Render.com deployment configuration
services:
  - type: web
    name: logivice-api
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node dist/server/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TABLEAU_TOKEN_NAME
        sync: false  # Set manually in Render dashboard
      - key: TABLEAU_TOKEN_VALUE
        sync: false  # Set manually in Render dashboard
      - key: TABLEAU_SITE
        value: logivice
      - key: TABLEAU_BASE_URL
        value: https://logivice.tableau.com
    disk:
      name: pricelists
      mountPath: /app/uploads/pricelists
      sizeGB: 1
